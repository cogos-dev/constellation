services:
  alpha:
    build: .
    container_name: alpha
    command: ["node", "--name", "alpha", "--port", "8100", "--data-dir", "/data", "--peers", "beta:8100,gamma:8100"]
    ports:
      - "8101:8100"
    volumes:
      - alpha-data:/data
    networks:
      - constellation

  beta:
    build: .
    container_name: beta
    command: ["node", "--name", "beta", "--port", "8100", "--data-dir", "/data", "--peers", "alpha:8100,gamma:8100"]
    ports:
      - "8102:8100"
    volumes:
      - beta-data:/data
    networks:
      - constellation

  gamma:
    build: .
    container_name: gamma
    command: ["node", "--name", "gamma", "--port", "8100", "--data-dir", "/data", "--peers", "alpha:8100,beta:8100"]
    ports:
      - "8103:8100"
    volumes:
      - gamma-data:/data
    networks:
      - constellation

volumes:
  alpha-data:
  beta-data:
  gamma-data:

networks:
  constellation:
    driver: bridge
